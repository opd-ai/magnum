name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go: ['1.24']
        include:
          - os: ubuntu-latest
            go: '1.24'
            coverage: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        run: go build ./...

      - name: Run tests with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Run vet
        run: go vet ./...

      - name: Check coverage threshold
        if: matrix.coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 85" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 85% threshold"
            exit 1
          fi

      - name: Upload coverage
        if: matrix.coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  conformance:
    name: Conformance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Download test vectors
        run: |
          mkdir -p testdata/opus_testvectors
          cd testdata/opus_testvectors
          curl -L -o opus_testvectors.tar.gz https://opus-codec.org/testvectors/opus_testvectors-rfc8251.tar.gz
          tar -xzf opus_testvectors.tar.gz --strip-components=1
          rm opus_testvectors.tar.gz

      - name: Run conformance tests
        run: go test -v -run TestConformance ./...
